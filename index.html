      font-weight: 700;

    .menu-btn.primary {

    }

    }

  <!-- 斜向代码雨动画（canvas + requestAnimationFrame，限帧25fps，CSS旋转实现斜向） -->
  <script>
    (function(){
      var canvas = document.getElementById('rain-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d', { alpha: true });

      var charArr = ['0','1'];

      var drops = [];
      var speeds = [];
      var columns = 0;
      var colWidth = 26;
      var fontSize = 18;
      var lastTime = 0;
      var FPS = 22;
      var frameInterval = 1000 / FPS;
      var W = 0;
      var H = 0;

      function resize() {
        var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        columns = Math.floor(W / colWidth) + 2;
        drops = new Array(columns);
        speeds = new Array(columns);
        for (var i = 0; i < columns; i++) {
          drops[i] = Math.random() * -(H / fontSize);
          speeds[i] = 0.35 + Math.random() * 0.65;
        }
      }

      function draw(timestamp) {
        requestAnimationFrame(draw);
        if (timestamp - lastTime < frameInterval) return;
        lastTime = timestamp;

        // 半透明覆盖产生拖尾淡出效果
        ctx.fillStyle = 'rgba(10,25,47,0.04)';
        ctx.fillRect(0, 0, W, H);

        ctx.font = fontSize + 'px "SF Mono","Fira Code","Consolas",monospace';

        for (var i = 0; i < columns; i++) {
          var x = i * colWidth;
          var y = drops[i] * fontSize;

          if (y < -fontSize || y > H + fontSize) {
            drops[i] += speeds[i];
            if (y > H + fontSize * 3 && Math.random() > 0.97) {
              drops[i] = Math.random() * -6;
              speeds[i] = 0.35 + Math.random() * 0.65;
            }
            continue;
          }

          // 头部亮白字符
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillText(charArr[Math.floor(Math.random() * 2)], x, y);

          // 拖尾淡色字符
          if (y > fontSize) {
            ctx.fillStyle = 'rgba(255,255,255,0.32)';
            ctx.fillText(charArr[Math.floor(Math.random() * 2)], x, y - fontSize);
          }

          drops[i] += speeds[i];

          if (y > H + fontSize * 3 && Math.random() > 0.97) {
            drops[i] = Math.random() * -6;
            speeds[i] = 0.35 + Math.random() * 0.65;
          }
        }
      }

      resize();
      window.addEventListener('resize', function () {
        clearTimeout(window._rainRt);
        window._rainRt = setTimeout(resize, 250);
      });
      requestAnimationFrame(draw);
    })();
  </script>

  <!-- 加载更新日志 -->
  <script>
    (function(){
      var panel = document.getElementById('changelog-panel');
      fetch('CHANGELOG.md')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.text(); })
        .then(function(md){
          var html = '';
          var lines = md.split('\n');
          var i = 0;
          while(i < lines.length){
            var line = lines[i];
            if(line.indexOf('## ') === 0){
              html += '<h2>' + esc(line.slice(3)) + '</h2>';
            } else if(line.indexOf('# ') === 0){
              html += '<h2>' + esc(line.slice(2)) + '</h2>';
            } else if(line.trim() !== ''){
              html += '<p>' + esc(line) + '</p>';
            }
            i++;
          }
          panel.innerHTML = html || '<p class="changelog-loading">暂无更新日志</p>';
        })
        .catch(function(){
          panel.innerHTML = '<p class="changelog-loading">更新日志加载失败</p>';
        });
      function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    })();
  </script>
